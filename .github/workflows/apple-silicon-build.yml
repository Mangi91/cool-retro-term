name: Build DMG for Apple Silicon

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest-xlarge
    
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6 for Apple Silicon
        run: |
          brew install qt@6
          echo "$(brew --prefix qt@6)/bin" >> $GITHUB_PATH

      - name: Build with qmake
        run: |
          mkdir -p build/dmg
          cd build/dmg
          qmake CONFIG+=release ../../cool-retro-term.pro
          make -j$(sysctl -n hw.ncpu)

      - name: Deploy application
        run: |
          cd build/dmg
          macdeployqt cool-retro-term.app -qmldir=../../app/qml
          
          # Handle QMLTermWidget plugin
          mkdir -p cool-retro-term.app/Contents/PlugIns/qmltermwidget
          cp -R qmltermwidget/QMLTermWidget cool-retro-term.app/Contents/PlugIns/qmltermwidget/

      - name: Code sign the app
        run: |
          cd build/dmg
          codesign --remove-signature cool-retro-term.app 2>/dev/null || true
          rm -rf cool-retro-term.app/Contents/_CodeSignature
          codesign --force --deep --sign - cool-retro-term.app

      - name: Create DMG
        run: |
          cd build/dmg
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            VERSION=$(git describe --tags --always --dirty=-dirty 2>/dev/null || echo "unknown")
          fi
          hdiutil create -volname "cool-retro-term" -srcfolder cool-retro-term.app -ov -format UDZO "cool-retro-term-${VERSION}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: cool-retro-term-dmg
          path: build/dmg/*.dmg

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
